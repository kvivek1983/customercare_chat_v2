<div class="login-wrapper">
  <div class="login-card">

    <!-- Left: Branding -->
    <div class="login-brand">
      <div class="brand-content">
        <img src="./assets/images/avatars/oneway-300.jpg" alt="OnewayCab" class="brand-logo" />
        <h2 class="brand-title">Smart Chat</h2>
        <p class="brand-subtitle">Customer Care Portal</p>
      </div>
      <div class="brand-glow"></div>
    </div>

    <!-- Right: Form -->
    <div class="login-form-section">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <h1 class="form-title">Welcome back</h1>
        <p class="form-subtitle">Sign in to your account</p>

        <div class="input-group-custom" [class.has-error]="submitted && f.username.errors">
          <svg cIcon name="cilUser" class="input-icon"></svg>
          <input formControlName="username" autoComplete="username" placeholder="Username"
            class="input-field" />
          <div *ngIf="submitted && f.username.errors" class="field-error">
            Username is required
          </div>
        </div>

        <div class="input-group-custom" [class.has-error]="submitted && f.password.errors">
          <svg cIcon name="cilLockLocked" class="input-icon"></svg>
          <input formControlName="password" autoComplete="current-password" placeholder="Password"
            type="password" class="input-field" />
          <div *ngIf="submitted && f.password.errors" class="field-error">
            Password is required
          </div>
        </div>

        <button type="submit" [disabled]="loading" class="login-btn">
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading">Signing in...</span>
        </button>
      </form>
    </div>

  </div>
</div>
